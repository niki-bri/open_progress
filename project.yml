name: OpenProgress
options:
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: A9KPZF869H
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  OpenProgress:
    type: application
    platform: iOS
    sources:
      - path: OpenProgress
        excludes:
          - Info.plist
          - OpenProgress.entitlements
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: OpenProgress/OpenProgress.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenProgress/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openprogress.personal
    dependencies:
      - target: OpenProgressWidgets
        embed: true
  OpenProgressWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenProgressWidgets
        excludes:
          - Info.plist
          - OpenProgressWidgets.entitlements
      - path: OpenProgress/Shared
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: OpenProgressWidgets/OpenProgressWidgets.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenProgressWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openprogress.personal.widgets
        SKIP_INSTALL: YES
schemes:
  OpenProgress:
    build:
      targets:
        OpenProgress: all
        OpenProgressWidgets: all
    run:
      config: Debug
    archive:
      config: Release
